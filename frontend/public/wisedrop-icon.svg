<!-- Wisedrop Logo - Icon Only (Transparent) -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dropGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.6" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Droplet shape -->
  <path 
    d="M 256 36.5 C 256 36.5, 73 183, 73 292.5 C 73 393.4, 155 475, 256 475 C 357 475, 439 393.4, 439 292.5 C 439 183, 256 36.5, 256 36.5 Z"
    fill="url(#dropGradient)"
    filter="url(#shadow)"
  />
  
  <!-- Highlight -->
  <ellipse 
    cx="220" 
    cy="220" 
    rx="73" 
    ry="110"
    fill="url(#highlightGradient)"
  />
  
  <!-- Arrow -->
  <g stroke="white" stroke-width="27" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <line x1="256" y1="165" x2="256" y2="310" />
    <line x1="256" y1="310" x2="201" y2="256" />
    <line x1="256" y1="310" x2="311" y2="256" />
  </g>
</svg>
